; ==========================================
; SATPI CONFIGURATION
; ==========================================

[station]
name = satpi                          ; station name
timezone = Europe/Zurich              ; local timezone
log_level = INFO                      ; reserved for future logging control

[qth]
latitude = 47.000000                  ; station latitude
longitude = 8.000000                  ; station longitude
altitude_m = 500                      ; station altitude in meters

[paths]
base_dir = /home/YOUR_USER/satpi				; project base directory
pass_file = /home/YOUR_USER/satpi/results/passes/passes.json	; predicted passes output
state_file = /home/YOUR_USER/satpi/results/passes/state.json	; reserved for future state handling
log_dir = /home/YOUR_USER/satpi/logs				; log directory
output_dir = /home/YOUR_USER/satpi/results/captures		; decoded pass output
generated_units_dir = /home/YOUR_USER/satpi/systemd/generated	; generated systemd units

[hardware]
source_id = 00000001                  ; RTL-SDR source id for SatDump
gain = 38.6                           ; tuner gain in dB
sample_rate = 2.4e6                   ; sample rate in Hz
bias_t = false                        ; enable Bias-T if required by LNA
ppm_correction = 0                    ; frequency correction in ppm

[satellite.METEOR-M2 3]
enabled = true                        ; enable this satellite
min_elevation_deg = 30                ; minimum pass elevation
frequency_hz = 137900000              ; downlink frequency
bandwidth_hz = 150000                 ; RF bandwidth
pipeline = meteor_m2-x_lrpt           ; SatDump pipeline

[satellite.METEOR-M2 4]
enabled = true                        ; enable this satellite
min_elevation_deg = 30                ; minimum pass elevation
frequency_hz = 137900000              ; downlink frequency
bandwidth_hz = 150000                 ; RF bandwidth
pipeline = meteor_m2-x_lrpt           ; SatDump pipeline

[satdump]
enabled = true                        ; enable live reception
binary_path = /usr/bin/satdump        ; SatDump binary
threads = 2                           ; reserved for future use
realtime = true                       ; reserved for future use

[scheduling]
pass_update_frequency = DAILY         ; DAILY or WEEKLY
pass_update_time = 00:00              ; HH:MM
pass_update_weekday = MONDAY          ; used only if frequency = WEEKLY
pre_start_seconds = 120               ; start reception before AOS
post_stop_seconds = 60                ; stop reception after LOS
max_pass_age_hours = 24               ; prediction horizon

[network]
tle_url = https://celestrak.org/NORAD/elements/gp.php?GROUP=weather&FORMAT=tle ; TLE source
tle_file = /home/YOUR_USER/satpi/results/tle/weather.tle
tle_timeout_seconds = 30              ; reserved for future curl timeout wiring

[decode]
enabled = true                        ; enable CADU decode
min_cadu_size_bytes = 1048576         ; minimum CADU size before decode
success_dir_relpath = MSU-MR          ; decode successful if this directory exists

[copytarget]
enabled = true                        ; enable post-decode copy/upload
type = rclone                         ; currently used: rclone

local_path =

remote_user =
remote_host =
remote_path =
ssh_port = 22

rclone_remote = dropbox               ; rclone remote name
rclone_path = meteor                  ; destination path on remote
create_link = true                    ; create share link after upload

[notify]
enabled = true                        ; send mail after successful upload
mail_to = your@email.example          ; notification recipient
mail_subject_prefix = SATPI           ; mail subject prefix
mail_bin = /usr/bin/msmtp             ; mail binary

[systemd]
service_user = YOUR_USER              ; user for generated systemd services
python_bin = /usr/bin/python3         ; Python interpreter used by systemd

[debug]
dry_run = false                       ; reserved for future dry-run support
save_pass_predictions = true          ; reserved for future debug output control
verbose_logging = false               ; reserved for future verbose mode

[optimize_reception]
enabled = true
apply_changes = false
write_suggested_config = true

satellite = METEOR-M2 3
pipeline = meteor_m2-x_lrpt

min_max_elevation_deg = 30
max_max_elevation_delta_deg = 10
same_pass_direction_only = true

evaluation_min_elevation_deg = 10
evaluation_max_elevation_deg = 85

min_passes_per_gain = 2
min_total_passes = 4

weight_deframer_synced_seconds = 1.0
weight_first_deframer_sync_delay = -0.4
weight_sync_drop_count = -0.5
weight_median_snr_synced = 0.3
weight_median_ber_synced = -0.8

output_dir = /home/YOUR_USER/satpi/results/optimization

[optimize_reception_ai]
enabled = true
max_passes = 25
model = gpt-5
output_file = /home/YOUR_USER/satpi/results/optimization/optimization-report-ai.txt
include_optimizer_report = true
api_key = YOUR_OPENAI_API_KEY
